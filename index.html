<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>麻將練習</title>
  <meta name="theme-color" content="#0f5132">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="麻將練習">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">🀄 麻將練習 <span class="ver" id="ver"></span></div>
    <div class="stats" id="stats">
      <span>題數 <b id="st-total">0</b></span>
      <span>最佳率 <b id="st-acc">—</b></span>
      <span>連對 <b id="st-streak">0</b></span>
      <span>最高連 <b id="st-best">0</b></span>
    </div>
  </header>

  <main>
    <!-- 模式：牌效率 / 防守 / 牌理 / 心法 -->
    <div class="modebar" id="modebar">
      <button class="mode on" data-mode="eff">🀄 牌效率</button>
      <button class="mode" data-mode="def">🛡️ 防守</button>
      <button class="mode" data-mode="read">🔍 讀牌</button>
      <button class="mode" data-mode="lab">📚 牌理</button>
      <button class="mode" data-mode="tips">📖 心法</button>
    </div>

    <!-- 難度(三檔，牌效率/防守用；標籤依模式變) -->
    <div class="diffbar" id="diffbar">
      <button class="diff on" data-level="0"></button>
      <button class="diff" data-level="1"></button>
      <button class="diff" data-level="2"></button>
    </div>

    <!-- 子題型(牌理用；預設隱藏，切到牌理模式才顯示) -->
    <div class="subbar hide" id="subbar">
      <button class="sub on" data-sub="atk">⚔️ 攻守</button>
      <button class="sub" data-sub="iso">🎴 孤張</button>
      <button class="sub" data-sub="wait">🎯 選聽</button>
    </div>

    <!-- 子題型(讀牌用；預設隱藏，切到讀牌模式才顯示) -->
    <div class="subbar hide" id="readbar">
      <button class="rsub on" data-rsub="press">⬇️ 向下壓</button>
      <button class="rsub" data-rsub="gua">🎋 六掛</button>
      <button class="rsub" data-rsub="nobe">🔗 衍牌</button>
    </div>

    <!-- ============ 牌效率模式 ============ -->
    <section class="card mode-eff" id="eff-card">
      <div class="prompt">你剛摸進一張，手上共 17 張——<b>打哪張進張最多？</b></div>
      <div class="hand" id="hand"><!-- 牌由 JS 產生 --></div>
      <div class="hint" id="hint">點下面你想打掉的牌</div>
    </section>

    <section class="card result mode-eff" id="result" hidden>
      <div class="verdict" id="verdict"></div>
      <ul class="explain" id="explain"></ul>
      <div class="rank" id="rank"></div>
      <button class="next" id="next">下一題 ▶</button>
    </section>

    <!-- ============ 防守模式 ============ -->
    <section class="card mode-def hide" id="def-card">
      <div class="prompt">對手很可能<b>聽牌</b>了！你剛摸進一張——<b>打哪張最不會放槍？</b></div>
      <div class="oppo" id="oppo"><!-- 對手牌河 + 副露 --></div>
      <div class="hand" id="def-hand"></div>
      <div class="hint" id="def-hint">點你想打（覺得最安全）的牌</div>
    </section>

    <section class="card result mode-def" id="def-result" hidden>
      <div class="verdict" id="def-verdict"></div>
      <ul class="explain" id="def-explain"></ul>
      <div class="rank" id="def-rank"></div>
      <button class="next" id="def-next">下一題 ▶</button>
    </section>

    <!-- ============ 牌理：① 該攻該守(判斷題) ============ -->
    <section class="card mode-lab sub-atk hide" id="atk-card">
      <div class="prompt">看這手 16 張的牌——<b>該攻，還是該守？</b></div>
      <div class="hand" id="atk-hand"></div>
      <div class="choicebar">
        <button class="choice atk" data-ans="atk">⚔️ 該攻</button>
        <button class="choice def" data-ans="def">🛡️ 該守</button>
      </div>
      <div class="hint" id="atk-hint">看「幾進聽」決定：好牌全力追聽、爛牌提早轉守</div>
    </section>

    <section class="card result mode-lab sub-atk hide" id="atk-result" hidden>
      <div class="verdict" id="atk-verdict"></div>
      <ul class="explain" id="atk-explain"></ul>
      <button class="next" id="atk-next">下一題 ▶</button>
    </section>

    <!-- ============ 牌理：② 孤張 / ③ 選聽(點牌題，共用一組卡) ============ -->
    <section class="card mode-lab sub-pick hide" id="pick-card">
      <div class="prompt" id="pick-prompt"></div>
      <div class="hand" id="pick-hand"></div>
      <div class="hint" id="pick-hint">點下面你想打掉的牌</div>
    </section>

    <section class="card result mode-lab sub-pick hide" id="pick-result" hidden>
      <div class="verdict" id="pick-verdict"></div>
      <ul class="explain" id="pick-explain"></ul>
      <div class="rank" id="pick-rank"></div>
      <button class="next" id="pick-next">下一題 ▶</button>
    </section>

    <!-- ============ 讀牌 ① 向下壓(門選判斷題) ============ -->
    <section class="card mode-read rsub-press hide" id="press-card">
      <div class="prompt">看對手的<b>捨牌河</b>——哪一門<b>整條安全</b>（他不太可能聽這門）？</div>
      <div class="oppo" id="press-oppo"><!-- 對手捨牌河 --></div>
      <div class="choicebar" id="press-choices">
        <button class="choice suit-m" data-suit="0">🌾 萬</button>
        <button class="choice suit-p" data-suit="1">⭕ 筒</button>
        <button class="choice suit-s" data-suit="2">🎋 索</button>
      </div>
      <div class="hint">對手把一門的低段(2/3)和高段(7/8)都丟了 → 那門他沒搭子在做</div>
    </section>

    <section class="card result mode-read rsub-press hide" id="press-result" hidden>
      <div class="verdict" id="press-verdict"></div>
      <ul class="explain" id="press-explain"></ul>
      <div class="rank" id="press-rank"></div>
      <button class="next" id="press-next">下一題 ▶</button>
    </section>

    <!-- ============ 讀牌 ② 六掛 / ③ 衍牌(點候選牌選最危險，共用一組卡) ============ -->
    <section class="card mode-read rsub-pick hide" id="read-card">
      <div class="prompt" id="read-prompt"></div>
      <div class="oppo" id="read-oppo"><!-- 對手捨牌河 / 拆搭打出的牌 --></div>
      <div class="hand" id="read-cands"></div>
      <div class="hint" id="read-hint">點你覺得<b>最危險</b>的那一張</div>
    </section>

    <section class="card result mode-read rsub-pick hide" id="read-result" hidden>
      <div class="verdict" id="read-verdict"></div>
      <ul class="explain" id="read-explain"></ul>
      <div class="rank" id="read-rank"></div>
      <button class="next" id="read-next">下一題 ▶</button>
    </section>

    <!-- ============ 心法(純教學卡，手風琴摺疊；內容由 tips.js + JS 生成) ============ -->
    <section class="mode-tips hide" id="tips-card">
      <div class="tips-list" id="tips-list"><!-- 摺疊卡由 renderTips() 產生 --></div>
    </section>

    <p class="note" id="note"></p>
  </main>

  <script src="engine.js"></script>
  <script src="defense.js"></script>
  <script src="readdiscard.js"></script>
  <script src="explain.js"></script>
  <script src="tips.js"></script>
  <script src="app.js"></script>
</body>
</html>
